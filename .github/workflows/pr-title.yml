name: PR title

# Enforce a Conventional Commits PR title. The title becomes the squash-merge
# commit message on main, so it must be well-formed (e.g. "feat: add login").

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  title:
    name: conventional title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
